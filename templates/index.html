<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个性化旅游系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
        }
       .attraction {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }
        h3 {
            margin-top: 0;
        }
        p {
            margin-bottom: 5px;
        }
        a {
            display: inline-block;
            background-color: #007BFF;
            color: white;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 3px;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>热门旅游景点推荐</h1>
    {% for attraction in attractions %}
        <div class="attraction">
            <h3>{{ attraction[1] }}</h3>
            <p>类别: {{ attraction[2] }}</p>
            <p>评分: {{ attraction[3] }}</p>
            <p>热度: {{ attraction[4] }}</p>
            <p>简介: {{ attraction[5] }}</p>
            <a href="{{ url_for('search_facilities', attraction_id=attraction[0], facility_type='超市') }}">查询附近超市</a>
        </div>
    {% endfor %}
    <a href="{{ url_for('logout') }}">登出</a>
</body>
</html>
